name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'bitloops/**'
      - 'xtask/**'
      - '.cargo/config.toml'
      - 'bitloops/.cargo/config.toml'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  rust-file-size:
    name: Rust File Size
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Check Rust file size limits
        run: cargo dev-file-size
  qat:
    name: QAT
    runs-on: self-hosted
    timeout-minutes: 180
    env:
      DUCKDB_DOWNLOAD_LIB: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          shared-key: ci
          cache-workspace-crates: true

      - name: Run QAT acceptance suites
        run: cargo qat
      - name: Show recent QAT diagnostics
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d target/qat-runs ]; then
            echo "No QAT run directory found at target/qat-runs"
            exit 0
          fi

          echo "Recent QAT suite roots:"
          find target/qat-runs -mindepth 1 -maxdepth 1 -type d | sort | tail -n 10

          if [ -f target/qat-runs/.last-run ]; then
            latest_run="$(tr -d '\r\n' < target/qat-runs/.last-run)"
            echo "Latest QAT suite root: ${latest_run}"
          fi

          mapfile -t recent_logs < <(
            find target/qat-runs -type f \
              \( -name 'run.json' -o -name 'terminal.log' -o -name 'daemon.stderr.log' \) \
              | sort | tail -n 30
          )

          if [ "${#recent_logs[@]}" -eq 0 ]; then
            echo "No QAT log files found under target/qat-runs"
            exit 0
          fi

          for log_path in "${recent_logs[@]}"; do
            echo "::group::${log_path}"
            tail -n 200 "${log_path}" || true
            echo "::endgroup::"
          done
      - name: Upload QAT artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: qat-runs-ci-${{ github.run_attempt }}
          path: target/qat-runs
          if-no-files-found: warn
  test:
    name: Test compile (Ubuntu)
    runs-on: self-hosted
    env:
      DUCKDB_DOWNLOAD_LIB: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@nextest

      - name: Compile test targets
        run: cargo nextest run -p bitloops --no-default-features --profile ci --no-run

  test-full:
    name: Full test suite
    runs-on: self-hosted
    env:
      DUCKDB_DOWNLOAD_LIB: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          shared-key: ci
          cache-workspace-crates: true

      - name: Run full test suite
        run: cargo dev-test-full

  build-matrix:
    name: Build smoke ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ contains(matrix.target, 'unknown-linux-musl') }}
        run: cargo install cross --locked

      - name: Install musl-tools
        if: contains(matrix.target, 'unknown-linux-musl')
        run: sudo apt-get install -y musl-tools

      - name: Install qemu for Linux arm64 smoke test
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user

      - name: Configure Windows arm64 linker
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: '"CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER=rust-lld" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append'

      - name: Build (musl targets)
        if: ${{ contains(matrix.target, 'unknown-linux-musl') }}
        env:
          DUCKDB_DOWNLOAD_LIB: '0'
        run: cross build --release -p bitloops --target ${{ matrix.target }} --features duckdb-bundled

      - name: Build (non-musl targets)
        if: ${{ !contains(matrix.target, 'unknown-linux-musl') }}
        run: cargo build --release -p bitloops --target ${{ matrix.target }}

      - name: Stage DuckDB runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binDir = "target/${{ matrix.target }}/release"
          $dll = Join-Path $binDir "deps/duckdb.dll"
          if (-not (Test-Path $dll)) {
            throw "Missing expected DuckDB runtime: $dll"
          }
          Copy-Item $dll (Join-Path $binDir "duckdb.dll") -Force

      - name: Smoke test (Unix)
        if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-musl'
        run: ./target/${{ matrix.target }}/release/bitloops --version

      - name: Smoke test (Linux arm64 via qemu)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: qemu-aarch64 ./target/${{ matrix.target }}/release/bitloops --version

      - name: Smoke test (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          & "target/${{ matrix.target }}/release/bitloops.exe" --version

      - name: Validate Windows arm64 build output
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $binDir = "target/${{ matrix.target }}/release"
          $exe = Join-Path $binDir "bitloops.exe"
          $dll = Join-Path $binDir "duckdb.dll"
          if (-not (Test-Path $exe)) {
            throw "Missing expected binary: $exe"
          }
          if (-not (Test-Path $dll)) {
            throw "Missing expected DuckDB runtime: $dll"
          }
