name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'bitloops/**'
      - 'xtask/**'
      - '.cargo/config.toml'
      - 'bitloops/.cargo/config.toml'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  rust-file-size:
    name: Rust File Size
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Check Rust file size limits
        run: cargo dev-file-size
  qat:
    name: QAT
    if: ${{ false }} # skip for now
    runs-on: self-hosted
    timeout-minutes: 180
    env:
      DUCKDB_DOWNLOAD_LIB: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          shared-key: ci
          cache-workspace-crates: true

      - name: Run QAT acceptance suites
        run: cargo qat
  test:
    name: Test compile (Ubuntu)
    runs-on: self-hosted
    env:
      DUCKDB_DOWNLOAD_LIB: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@nextest

      - name: Compile test targets
        run: cargo nextest run -p bitloops --no-default-features --profile ci --no-run

  test-full:
    name: Full test suite
    runs-on: self-hosted
    env:
      DUCKDB_DOWNLOAD_LIB: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          shared-key: ci
          cache-workspace-crates: true

      - name: Run full test suite
        run: cargo dev-test-full

  build-matrix:
    name: Build smoke ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ contains(matrix.target, 'unknown-linux-musl') }}
        run: cargo install cross --locked

      - name: Install musl-tools
        if: contains(matrix.target, 'unknown-linux-musl')
        run: sudo apt-get install -y musl-tools

      - name: Install qemu for Linux arm64 smoke test
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user

      - name: Configure Windows arm64 linker
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: '"CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER=rust-lld" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append'

      - name: Build (musl targets)
        if: ${{ contains(matrix.target, 'unknown-linux-musl') }}
        env:
          DUCKDB_DOWNLOAD_LIB: '0'
        run: cross build --release -p bitloops --target ${{ matrix.target }} --features duckdb-bundled

      - name: Build (non-musl targets)
        if: ${{ !contains(matrix.target, 'unknown-linux-musl') }}
        run: cargo build --release -p bitloops --target ${{ matrix.target }}

      - name: Stage DuckDB runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binDir = "target/${{ matrix.target }}/release"
          $dll = Join-Path $binDir "deps/duckdb.dll"
          if (-not (Test-Path $dll)) {
            throw "Missing expected DuckDB runtime: $dll"
          }
          Copy-Item $dll (Join-Path $binDir "duckdb.dll") -Force

      - name: Smoke test (Unix)
        if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-musl'
        run: ./target/${{ matrix.target }}/release/bitloops --version

      - name: Smoke test (Linux arm64 via qemu)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: qemu-aarch64 ./target/${{ matrix.target }}/release/bitloops --version

      - name: Smoke test (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          & "target/${{ matrix.target }}/release/bitloops.exe" --version

      - name: Validate Windows arm64 build output
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $binDir = "target/${{ matrix.target }}/release"
          $exe = Join-Path $binDir "bitloops.exe"
          $dll = Join-Path $binDir "duckdb.dll"
          if (-not (Test-Path $exe)) {
            throw "Missing expected binary: $exe"
          }
          if (-not (Test-Path $dll)) {
            throw "Missing expected DuckDB runtime: $dll"
          }
