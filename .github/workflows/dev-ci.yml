name: Develop CI

on:
  pull_request:
    branches:
      - develop
    paths:
      - 'bitloops/**'
      - 'xtask/**'
      - '.cargo/config.toml'
      - 'bitloops/.cargo/config.toml'
      - '.github/workflows/dev-ci.yml'

permissions:
  contents: read

env:
  DUCKDB_DOWNLOAD_LIB: '1'

jobs:
  rust-file-size:
    name: Rust file size
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Check Rust file size limits
        run: cargo dev-file-size

  fmt:
    name: Format
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt --all --check --manifest-path bitloops/Cargo.toml

  clippy:
    name: Clippy
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          shared-key: dev-ci
          cache-workspace-crates: true
      - name: cargo clippy
        run: cargo clippy --manifest-path bitloops/Cargo.toml --all-targets --no-default-features -- -D warnings

  test-full:
    name: Full test suite
    if: ${{ !github.event.pull_request.draft }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          shared-key: dev-ci
          cache-workspace-crates: true
      - name: Run full test suite
        run: cargo dev-test-full
