name: Develop CI

on:
  pull_request:
    branches:
      - develop
    paths:
      - 'bitloops/**'
      - 'xtask/**'
      - '.cargo/config.toml'
      - 'bitloops/.cargo/config.toml'
      - '.github/workflows/dev-ci.yml'
  push:
    branches:
      - develop
    paths:
      - 'bitloops/**'
      - 'xtask/**'
      - '.cargo/config.toml'
      - 'bitloops/.cargo/config.toml'
      - '.github/workflows/dev-ci.yml'

permissions:
  contents: read

env:
  DUCKDB_DOWNLOAD_LIB: '1'

jobs:
  rust-file-size:
    name: Rust file size
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Check Rust file size limits
        run: cargo dev-file-size

  fmt:
    name: Format
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt --all --check --manifest-path bitloops/Cargo.toml

  clippy:
    name: Clippy
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: self-hosted
    env:
      DUCKDB_DOWNLOAD_LIB: '0'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          shared-key: dev-ci
          cache-workspace-crates: true
      - name: cargo clippy
        run: cargo clippy --manifest-path bitloops/Cargo.toml --all-targets --no-default-features -- -D warnings

  test-fast:
    name: Fast test lane
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          shared-key: dev-ci
          cache-workspace-crates: true
      - name: Run fast test lane
        run: cargo dev-test-fast

  test-smoke:
    name: Merge smoke lane
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          shared-key: dev-ci
          cache-workspace-crates: true
      - name: Run merge smoke lane
        run: cargo dev-test-smoke

  develop-gate-qat:
    name: Develop Gate QAT
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          shared-key: dev-ci
          cache-workspace-crates: true
      - name: Run develop gate QAT
        run: cargo qat-develop-gate
      - name: Show recent QAT diagnostics
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d target/qat-runs ]; then
            echo "No QAT run directory found at target/qat-runs"
            exit 0
          fi

          echo "Recent QAT suite roots:"
          find target/qat-runs -mindepth 1 -maxdepth 1 -type d | sort | tail -n 10

          if [ -f target/qat-runs/.last-run ]; then
            latest_run="$(tr -d '\r\n' < target/qat-runs/.last-run)"
            echo "Latest QAT suite root: ${latest_run}"
          fi

          mapfile -t recent_logs < <(
            find target/qat-runs -type f \
              \( -name 'run.json' -o -name 'terminal.log' -o -name 'daemon.stderr.log' \) \
              | sort | tail -n 30
          )

          if [ "${#recent_logs[@]}" -eq 0 ]; then
            echo "No QAT log files found under target/qat-runs"
            exit 0
          fi

          for log_path in "${recent_logs[@]}"; do
            echo "::group::${log_path}"
            tail -n 200 "${log_path}" || true
            echo "::endgroup::"
          done
      - name: Upload QAT artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: qat-runs-develop-gate-${{ github.run_attempt }}
          path: target/qat-runs
          if-no-files-found: warn

  test-full:
    name: Full test suite
    if: ${{ github.event_name == 'push' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          shared-key: dev-ci
          cache-workspace-crates: true
      - name: Run full test suite
        run: cargo dev-test-full
