name: Documentation Consistency AI Review

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "documentation/*.md"
      - "documentation/**/*.md"
      - "documentation/**/*.mdx"
      - ".github/workflows/documentation-consistency-ai.yml"
      - ".github/scripts/documentation-consistency-ai-review.mjs"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: documentation-consistency-ai-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Documentation consistency AI review (informational)
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch content
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Review PR changes against project documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_PR_REVIEW }}
          OPENAI_MODEL: gpt-5.4-pro
          OPENAI_REASONING_EFFORT: xhigh
        run: node .github/scripts/documentation-consistency-ai-review.mjs
