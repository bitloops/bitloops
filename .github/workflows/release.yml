name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    environment: "Production CLI"
    env:
      BITLOOPS_POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_PROJECT_ID: ${{ vars.POSTHOG_PROJECT_ID }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ contains(matrix.target, 'unknown-linux-musl') }}
        run: cargo install cross --locked

      - name: Install musl-tools
        if: contains(matrix.target, 'unknown-linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install qemu for Linux arm64 smoke test
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user

      - name: Configure Windows arm64 linker
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          "CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER=rust-lld" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build (musl targets)
        if: ${{ contains(matrix.target, 'unknown-linux-musl') }}
        env:
          DUCKDB_DOWNLOAD_LIB: "0"
        run: |
          cross build --release --target ${{ matrix.target }} -p bitloops --features duckdb-bundled

      - name: Build (non-musl targets)
        if: ${{ !contains(matrix.target, 'unknown-linux-musl') }}
        run: cargo build --release --target ${{ matrix.target }} -p bitloops

      - name: Stage DuckDB runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          bin_dir="target/${{ matrix.target }}/release"
          dylib="$bin_dir/deps/libduckdb.dylib"
          if [ ! -f "$dylib" ]; then
            echo "Missing expected DuckDB runtime: $dylib" >&2
            exit 1
          fi
          cp "$dylib" "$bin_dir/libduckdb.dylib"

      - name: Stage DuckDB runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binDir = "target/${{ matrix.target }}/release"
          $dll = Join-Path $binDir "deps/duckdb.dll"
          if (-not (Test-Path $dll)) {
            throw "Missing expected DuckDB runtime: $dll"
          }
          Copy-Item $dll (Join-Path $binDir "duckdb.dll") -Force

      - name: Smoke test (Unix)
        if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-musl'
        run: ./target/${{ matrix.target }}/release/bitloops --version

      - name: Smoke test (Linux arm64 via qemu)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: qemu-aarch64 ./target/${{ matrix.target }}/release/bitloops --version

      - name: Smoke test (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          & "target/${{ matrix.target }}/release/bitloops.exe" --version

      - name: Validate Windows arm64 build output
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $binDir = "target/${{ matrix.target }}/release"
          $exe = Join-Path $binDir "bitloops.exe"
          $dll = Join-Path $binDir "duckdb.dll"
          if (-not (Test-Path $exe)) { throw "Missing expected binary: $exe" }
          if (-not (Test-Path $dll)) { throw "Missing expected DuckDB runtime: $dll" }

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > apple-cert.p12

          security create-keychain -p temp123 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp123 build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          security import apple-cert.p12 \
            -k build.keychain \
            -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k temp123 \
            build.keychain

      - name: Sign macOS binary
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "target/${{ matrix.target }}/release/libduckdb.dylib"
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "target/${{ matrix.target }}/release/bitloops"

      - name: Verify macOS signature
        if: runner.os == 'macOS'
        run: |
          codesign --verify --verbose=4 "target/${{ matrix.target }}/release/libduckdb.dylib"
          codesign --verify --verbose=4 "target/${{ matrix.target }}/release/bitloops"
          codesign --display --verbose=4 "target/${{ matrix.target }}/release/libduckdb.dylib"
          codesign --display --verbose=4 "target/${{ matrix.target }}/release/bitloops"
          spctl -a -t exec -vv "target/${{ matrix.target }}/release/bitloops" || true

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/bitloops" dist/package/bitloops
          tar -C dist/package -czf dist/bitloops-${{ matrix.target }}.tar.gz bitloops

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/bitloops" dist/package/bitloops
          cp "target/${{ matrix.target }}/release/libduckdb.dylib" dist/package/libduckdb.dylib
          ditto -c -k --keepParent dist/package "dist/bitloops-${{ matrix.target }}.zip"

      - name: Restore App Store Connect key
        if: runner.os == 'macOS'
        env:
          APPSTORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_P8_BASE64 }}
        run: |
          echo "$APPSTORE_CONNECT_API_KEY_P8_BASE64" | base64 --decode > AuthKey.p8

      - name: Notarize macOS archive
        if: runner.os == 'macOS'
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ vars.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ vars.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun notarytool submit "dist/bitloops-${{ matrix.target }}.zip" \
            --key AuthKey.p8 \
            --key-id "$APPSTORE_CONNECT_KEY_ID" \
            --issuer "$APPSTORE_CONNECT_ISSUER_ID" \
            --wait

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/package -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/bitloops.exe" "dist/package/bitloops.exe" -Force
          Copy-Item "target/${{ matrix.target }}/release/duckdb.dll" "dist/package/duckdb.dll" -Force
          Compress-Archive -Path dist/package/* -DestinationPath dist/bitloops-${{ matrix.target }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: dist/bitloops-${{ matrix.target }}.*

  publish:
    name: Publish release
    runs-on: self-hosted
    needs: build
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum bitloops-* > checksums-sha256.txt

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/bitloops-*
            dist/checksums-sha256.txt

  update-homebrew-tap:
    name: Update Homebrew tap formula
    runs-on: self-hosted
    needs: publish
    environment: "Production CLI"
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: bitloops
          repositories: homebrew-tap

      - name: Checkout tap repo
        uses: actions/checkout@v5
        with:
          repository: bitloops/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap

      - name: Download release checksums
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          curl -fsSL "https://github.com/${REPO}/releases/download/${TAG}/checksums-sha256.txt" -o checksums.txt

      - name: Extract checksums
        run: |
          DARWIN_ARM="$(awk '$2 == "bitloops-aarch64-apple-darwin.zip" {print $1; exit}' checksums.txt)"
          DARWIN_INTEL="$(awk '$2 == "bitloops-x86_64-apple-darwin.zip" {print $1; exit}' checksums.txt)"
          LINUX_X86="$(awk '$2 == "bitloops-x86_64-unknown-linux-musl.tar.gz" {print $1; exit}' checksums.txt)"
          LINUX_ARM="$(awk '$2 == "bitloops-aarch64-unknown-linux-musl.tar.gz" {print $1; exit}' checksums.txt)"

          for value in "$DARWIN_ARM" "$DARWIN_INTEL" "$LINUX_X86" "$LINUX_ARM"; do
            if [[ -z "$value" ]]; then
              echo "Missing one or more required checksums in checksums-sha256.txt"
              exit 1
            fi
          done

          echo "SHA256_DARWIN_ARM=${DARWIN_ARM}" >> "$GITHUB_ENV"
          echo "SHA256_DARWIN_INTEL=${DARWIN_INTEL}" >> "$GITHUB_ENV"
          echo "SHA256_LINUX_X86=${LINUX_X86}" >> "$GITHUB_ENV"
          echo "SHA256_LINUX_ARM=${LINUX_ARM}" >> "$GITHUB_ENV"

      - name: Update formula
        working-directory: homebrew-tap
        env:
          VERSION: ${{ env.VERSION }}
          SHA256_DARWIN_ARM: ${{ env.SHA256_DARWIN_ARM }}
          SHA256_DARWIN_INTEL: ${{ env.SHA256_DARWIN_INTEL }}
          SHA256_LINUX_X86: ${{ env.SHA256_LINUX_X86 }}
          SHA256_LINUX_ARM: ${{ env.SHA256_LINUX_ARM }}
        run: |
          if [[ ! -f Formula/bitloops.rb.template ]]; then
            echo "Missing required file: Formula/bitloops.rb.template"
            exit 1
          fi

          sed -e "s/{{VERSION}}/${VERSION}/g" \
              -e "s/{{SHA256_DARWIN_ARM}}/${SHA256_DARWIN_ARM}/g" \
              -e "s/{{SHA256_DARWIN_INTEL}}/${SHA256_DARWIN_INTEL}/g" \
              -e "s/{{SHA256_LINUX_X86}}/${SHA256_LINUX_X86}/g" \
              -e "s/{{SHA256_LINUX_ARM}}/${SHA256_LINUX_ARM}/g" \
              Formula/bitloops.rb.template > Formula/bitloops.rb

      - name: Create PR in tap repo
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap
          commit-message: bitloops ${{ env.VERSION }}
          branch: update-bitloops-v${{ env.VERSION }}
          delete-branch: true
          title: bitloops ${{ env.VERSION }}
          body: |
            Automated formula update from [CLI release v${{ env.VERSION }}](https://github.com/${{ github.repository }}/releases/tag/v${{ env.VERSION }}).
          base: main
          add-paths: |
            Formula/bitloops.rb

  verify:
    name: Verify published release artifacts
    runs-on: self-hosted
    needs: publish
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Download assets from published release
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p verify
          cd verify

          assets=(
            bitloops-aarch64-apple-darwin.zip
            bitloops-x86_64-apple-darwin.zip
            bitloops-x86_64-unknown-linux-musl.tar.gz
            bitloops-aarch64-unknown-linux-musl.tar.gz
            bitloops-x86_64-pc-windows-msvc.zip
            bitloops-aarch64-pc-windows-msvc.zip
            checksums-sha256.txt
          )

          for asset in "${assets[@]}"; do
            curl -fL -o "$asset" "https://github.com/${REPO}/releases/download/${TAG}/${asset}"
          done

      - name: Verify checksums
        run: |
          cd verify
          sha256sum -c checksums-sha256.txt

      - name: Smoke test linux release binary
        run: |
          cd verify
          tar -xzf bitloops-x86_64-unknown-linux-musl.tar.gz
          chmod +x bitloops
          ./bitloops --version

      - name: Smoke test linux arm64 release binary via qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user
          cd verify
          mkdir -p arm64
          tar -xzf bitloops-aarch64-unknown-linux-musl.tar.gz -C arm64
          chmod +x arm64/bitloops
          qemu-aarch64 arm64/bitloops --version

      - name: Generate Slack message
        id: slack_msg
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          PART1=(
            "🚀 Bitloops CLI v${VERSION} just dropped"
            "🚀 Bitloops CLI v${VERSION} is live"
            "🚀 Bitloops CLI v${VERSION} just shipped"
            "🚀 Bitloops CLI v${VERSION} is out in the wild"
            "🚀 Bitloops CLI v${VERSION} just landed"
            "🚀 Bitloops CLI v${VERSION} is now available"
            "🚀 Bitloops CLI v${VERSION} deployed successfully"
            "🚀 Bitloops CLI v${VERSION} rollout complete"
            "🚀 Bitloops CLI v${VERSION} is officially out"
            "🚀 Bitloops CLI v${VERSION} release complete"
          )

          PART2=(
            "— built through strong cross-team collaboration 👏"
            "— another solid team delivery 💪"
            "— delivered with great engineering effort ⚙️"
            "— a result of coordinated team execution 🤝"
            "— reflecting high-quality team craftsmanship 🛠️"
            "— powered by focused team iteration 🔁"
            "— showcasing strong ownership across the team 🧠"
            "— driven by consistent team momentum 📈"
            "— executed with precision across contributors 🎯"
            "— backed by collective engineering excellence ✨"
          )

          P1_INDEX=$((RANDOM % ${#PART1[@]}))
          P2_INDEX=$((RANDOM % ${#PART2[@]}))
          MESSAGE="${PART1[$P1_INDEX]} ${PART2[$P2_INDEX]}"

          echo "message=$MESSAGE" >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "${{ steps.slack_msg.outputs.message }}"
