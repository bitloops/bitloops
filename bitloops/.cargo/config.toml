[env]
# Fast local default for hosts with official DuckDB prebuilts (including Apple silicon macOS).
DUCKDB_DOWNLOAD_LIB = { value = "1", force = false }

[alias]
# Cargo-first local developer surface from `bitloops/`.
dev-check = "check --no-default-features"
dev-build = "build --no-default-features"
dev-install = "run --manifest-path ../Cargo.toml --quiet --package xtask -- install"
dev-file-size = "run --manifest-path ../Cargo.toml --quiet --package xtask -- file-size ."
dev-loop = "run --manifest-path ../Cargo.toml --quiet --package xtask -- dev-loop"
dev-fmt = "fmt --all"
dev-fmt-check = "fmt --all --check"
dev-clippy = "clippy --all-targets --no-default-features -- -D warnings"
dev-test-lib = "run --manifest-path ../Cargo.toml --quiet --package xtask -- test lib"
dev-test-core = "run --manifest-path ../Cargo.toml --quiet --package xtask -- test core"
dev-test-cli = "run --manifest-path ../Cargo.toml --quiet --package xtask -- test cli"
dev-test-fast = "run --manifest-path ../Cargo.toml --quiet --package xtask -- test fast"
dev-test-slow = "run --manifest-path ../Cargo.toml --quiet --package xtask -- test slow"
dev-test-full = "run --manifest-path ../Cargo.toml --quiet --package xtask -- test full"
dev-coverage = "llvm-cov --workspace --all-targets --features slow-tests --no-default-features --lcov --output-path target/llvm-cov.info"
dev-coverage-html = "llvm-cov --workspace --all-targets --features slow-tests --no-default-features --html --output-dir target/llvm-cov-html"

# Explicit bundled-DuckDB aliases for release/offline/exotic targets.
dev-check-bundled = "check --features duckdb-bundled"
dev-build-bundled = "build --features duckdb-bundled"

# Back-compat aliases (kept while docs and local usage migrate to `dev-*`).
test-all = "test --no-fail-fast --no-default-features"
test-core = "test --lib --no-fail-fast --no-default-features"
test-cli = "test --bin bitloops --no-fail-fast --no-default-features"
test-integration = "test --tests --no-fail-fast --no-default-features"
test-coverage = "llvm-cov --workspace --all-targets --features slow-tests --no-default-features --html --output-dir target/llvm-cov-html"
test-coverage-lcov = "llvm-cov --workspace --all-targets --features slow-tests --no-default-features --lcov --output-path target/llvm-cov.info"
