type DashboardAgent {
	key: String!
}

type DashboardBranchSummary {
	branch: String!
	checkpointCommits: Int!
}

type DashboardBundleVersion {
	currentVersion: String
	latestApplicableVersion: String
	installAvailable: Boolean!
	reason: String!
}

type DashboardCheckpoint {
	checkpointId: String!
	strategy: String!
	branch: String!
	checkpointsCount: Int!
	filesTouched: [DashboardCommitFileDiff!]!
	sessionCount: Int!
	tokenUsage: DashboardTokenUsage
	sessionId: String!
	agents: [String!]!
	firstPromptPreview: String!
	createdAt: String!
	isTask: Boolean!
	toolUseId: String!
}

type DashboardCheckpointDetail {
	checkpointId: String!
	strategy: String!
	branch: String!
	checkpointsCount: Int!
	filesTouched: [DashboardCommitFileDiff!]!
	sessionCount: Int!
	tokenUsage: DashboardTokenUsage
	sessions: [DashboardCheckpointSessionDetail!]!
}

type DashboardCheckpointSessionDetail {
	sessionIndex: Int!
	sessionId: String!
	agent: String!
	createdAt: String!
	isTask: Boolean!
	toolUseId: String!
	metadataJson: String!
	transcriptJsonl: String!
	promptsText: String!
	contextText: String!
}

type DashboardCommit {
	sha: String!
	parents: [String!]!
	authorName: String!
	authorEmail: String!
	timestamp: Int!
	message: String!
	filesTouched: [DashboardCommitFileDiff!]!
}

type DashboardCommitFileDiff {
	filepath: String!
	additionsCount: Int!
	deletionsCount: Int!
	changeKind: String
	copiedFromPath: String
	copiedFromBlobSha: String
}

type DashboardCommitRow {
	commit: DashboardCommit!
	checkpoint: DashboardCheckpoint!
	checkpoints: [DashboardCheckpoint!]!
}

type DashboardFetchBundleResult {
	installedVersion: String!
	bundleDir: String!
	status: String!
	checksumVerified: Boolean!
}

type DashboardInteractionActor {
	id: String
	name: String
	email: String
	source: String
}

type DashboardInteractionActorBucket {
	actorId: String!
	actorName: String!
	actorEmail: String!
	actorSource: String!
	sessionCount: Int!
	turnCount: Int!
}

type DashboardInteractionAgentBucket {
	key: String!
	sessionCount: Int!
	turnCount: Int!
}

type DashboardInteractionCommitAuthor {
	checkpointId: String!
	commitSha: String!
	name: String
	email: String
	committedAt: String
}

type DashboardInteractionCommitAuthorBucket {
	authorName: String!
	authorEmail: String!
	checkpointCount: Int!
	sessionCount: Int!
	turnCount: Int!
}

type DashboardInteractionEvent {
	eventId: String!
	sessionId: String!
	turnId: String
	branch: String
	actor: DashboardInteractionActor
	eventType: String!
	eventTime: String!
	agentType: String!
	model: String
	toolUseId: String
	toolKind: String
	taskDescription: String
	subagentId: String
	payload: JSON
}

input DashboardInteractionFilterInput {
	since: String
	until: String
	actor: String
	actorId: String
	actorEmail: String
	commitAuthor: String
	commitAuthorEmail: String
	agent: String
	model: String
	branch: String
	sessionId: String
	turnId: String
	checkpointId: String
	toolUseId: String
	toolKind: String
	hasCheckpoint: Boolean
	path: String
}

type DashboardInteractionKpis {
	totalSessions: Int!
	totalTurns: Int!
	totalCheckpoints: Int!
	totalToolUses: Int!
	totalActors: Int!
	totalAgents: Int!
	inputTokens: Int!
	outputTokens: Int!
	cacheCreationTokens: Int!
	cacheReadTokens: Int!
	apiCallCount: Int!
}

input DashboardInteractionSearchInput {
	filter: DashboardInteractionFilterInput
	query: String!
	limit: Int
}

type DashboardInteractionSession {
	sessionId: String!
	branch: String
	actor: DashboardInteractionActor
	agentType: String!
	model: String
	firstPrompt: String
	startedAt: String!
	endedAt: String
	lastEventAt: String
	turnCount: Int!
	checkpointCount: Int!
	tokenUsage: DashboardTokenUsage
	filePaths: [String!]!
	toolUses: [DashboardInteractionToolUse!]!
	linkedCheckpoints: [DashboardInteractionCommitAuthor!]!
	latestCommitAuthor: DashboardInteractionCommitAuthor
}

type DashboardInteractionSessionDetail {
	summary: DashboardInteractionSession!
	turns: [DashboardInteractionTurn!]!
	rawEvents: [DashboardInteractionEvent!]!
}

type DashboardInteractionSessionSearchHit {
	session: DashboardInteractionSession!
	score: Int!
	matchedFields: [String!]!
}

type DashboardInteractionToolUse {
	toolUseId: String!
	sessionId: String!
	turnId: String
	toolKind: String
	taskDescription: String
	subagentId: String
	transcriptPath: String
	startedAt: String
	endedAt: String
}

type DashboardInteractionTurn {
	turnId: String!
	sessionId: String!
	branch: String
	actor: DashboardInteractionActor
	turnNumber: Int!
	prompt: String
	summary: String
	agentType: String!
	model: String
	startedAt: String!
	endedAt: String
	tokenUsage: DashboardTokenUsage
	filesModified: [String!]!
	checkpointId: String
	toolUses: [DashboardInteractionToolUse!]!
	linkedCheckpoints: [DashboardInteractionCommitAuthor!]!
	latestCommitAuthor: DashboardInteractionCommitAuthor
}

type DashboardInteractionTurnSearchHit {
	turn: DashboardInteractionTurn!
	session: DashboardInteractionSession!
	score: Int!
	matchedFields: [String!]!
}

type DashboardInteractionUpdate {
	repoId: String!
	sessionCount: Int!
	turnCount: Int!
	latestSessionId: String
	latestSessionUpdatedAt: String
	latestTurnId: String
	latestTurnUpdatedAt: String
}

type DashboardKpis {
	totalCommits: Int!
	totalCheckpoints: Int!
	totalAgents: Int!
	totalSessions: Int!
	filesTouchedCount: Int!
	inputTokens: Int!
	outputTokens: Int!
	cacheCreationTokens: Int!
	cacheReadTokens: Int!
	apiCallCount: Int!
	averageTokensPerCheckpoint: Float!
	averageSessionsPerCheckpoint: Float!
}

type DashboardMutationRoot {
	fetchBundle: DashboardFetchBundleResult!
}

type DashboardQueryRoot {
	health: HealthStatus!
	repositories: [DashboardRepository!]!
	kpis(repoId: String, branch: String!, from: String, to: String, user: String, agent: String): DashboardKpis!
	commits(repoId: String, branch: String!, from: String, to: String, user: String, agent: String, limit: Int, offset: Int): [DashboardCommitRow!]!
	branches(repoId: String, from: String, to: String): [DashboardBranchSummary!]!
	users(repoId: String, branch: String!, from: String, to: String, agent: String): [DashboardUser!]!
	agents(repoId: String, branch: String!, from: String, to: String, user: String): [DashboardAgent!]!
	checkpoint(repoId: String, checkpointId: String!): DashboardCheckpointDetail!
	interactionKpis(repoId: String, filter: DashboardInteractionFilterInput): DashboardInteractionKpis!
	interactionSessions(repoId: String, filter: DashboardInteractionFilterInput, limit: Int, offset: Int): [DashboardInteractionSession!]!
	interactionSession(sessionId: String!, repoId: String): DashboardInteractionSessionDetail!
	interactionActors(repoId: String, filter: DashboardInteractionFilterInput): [DashboardInteractionActorBucket!]!
	interactionCommitAuthors(repoId: String, filter: DashboardInteractionFilterInput): [DashboardInteractionCommitAuthorBucket!]!
	interactionAgents(repoId: String, filter: DashboardInteractionFilterInput): [DashboardInteractionAgentBucket!]!
	searchInteractionSessions(repoId: String, input: DashboardInteractionSearchInput!): [DashboardInteractionSessionSearchHit!]!
	searchInteractionTurns(repoId: String, input: DashboardInteractionSearchInput!): [DashboardInteractionTurnSearchHit!]!
	checkBundleVersion: DashboardBundleVersion!
}

type DashboardRepository {
	repoId: String!
	identity: String!
	name: String!
	provider: String!
	organization: String!
	defaultBranch: String
}

type DashboardSubscriptionRoot {
	interactionUpdates(repoId: String): DashboardInteractionUpdate!
}

type DashboardTokenUsage {
	inputTokens: Int!
	outputTokens: Int!
	cacheCreationTokens: Int!
	cacheReadTokens: Int!
	apiCallCount: Int!
}

type DashboardUser {
	key: String!
	name: String!
	email: String!
}

type HealthBackendStatus {
	connected: Boolean!
	backend: String!
	status: String!
	detail: String!
}

type HealthStatus {
	relational: HealthBackendStatus!
	events: HealthBackendStatus!
	blob: HealthBackendStatus!
}

"""
A scalar that can represent any JSON value.
"""
scalar JSON

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: DashboardQueryRoot
	mutation: DashboardMutationRoot
	subscription: DashboardSubscriptionRoot
}
